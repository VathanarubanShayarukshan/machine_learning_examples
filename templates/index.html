<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI House Predictor</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        h2 { color: #1a73e8; margin-bottom: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 600; color: #5f6368; margin-bottom: 5px; }
        input { padding: 12px; border: 1px solid #dadce0; border-radius: 8px; font-size: 14px; transition: 0.2s; }
        input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        .btns { grid-column: span 2; display: flex; gap: 10px; margin-top: 20px; }
        .btn-predict { flex: 2; background: #1a73e8; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-clear { flex: 1; background: #ea4335; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .result { margin-top: 25px; padding: 20px; background: #e8f0fe; border-radius: 12px; text-align: center; }
        .price { font-size: 24px; font-weight: 700; color: #1967d2; }
        .again { display: inline-block; margin-top: 10px; color: #1a73e8; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏠 AI வீட்டு விலை கணிப்பு</h2>
    <form action="/predict" method="post" class="grid">
        <div class="input-box"><label>Lot Area</label><input type="number" name="i1" value="8500" required></div>
        <div class="input-box"><label>Overall Quality</label><input type="number" name="i2" value="7" required></div>
        <div class="input-box"><label>Year Built</label><input type="number" name="i3" value="2005" required></div>
        <div class="input-box"><label>Total Bsmt SF</label><input type="number" name="i4" value="1050" required></div>
        <div class="input-box"><label>1st Floor SF</label><input type="number" name="i5" value="1100" required></div>
        <div class="input-box"><label>2nd Floor SF</label><input type="number" name="i6" value="800" required></div>
        <div class="input-box"><label>Gr Living Area</label><input type="number" name="i7" value="1900" required></div>
        <div class="input-box"><label>Full Bath</label><input type="number" name="i8" value="2" required></div>
        <div class="input-box"><label>Bedrooms</label><input type="number" name="i9" value="3" required></div>
        <div class="input-box"><label>Total Rooms</label><input type="number" name="i10" value="7" required></div>
        <div class="input-box" style="grid-column: span 2;"><label>Garage Cars</label><input type="number" name="i11" value="2" required></div>
        
        <div class="btns">
            <button type="submit" class="btn-predict">விலையை கணி (Predict Price)</button>
            <button type="reset" class="btn-clear">அனைத்தையும் அழி (Clear)</button>
        </div>
    </form>

    {% if prediction_text %}
    <div class="result">
        <p style="margin:0; font-size: 14px; color: #5f6368;">கணிக்கப்பட்ட உத்தேச விலை:</p>
        <div class="price">{{ prediction_text }}</div>
        <a href="/" class="again">← புதிய கணிப்பு செய்ய (Predict Again)</a>
    </div>
    {% endif %}
</div>

</body>
</html>
